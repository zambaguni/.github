name: 재택근무 체크리스트
description: 주 1회 재택근무 전날 작성하는 작업 계획 및 당일 체크리스트
title: "[재택] YYYY-MM-DD"
labels: ["remote-work"]
projects: ["zambaguni/2"]
body:
  - type: markdown
    attributes:
      value: |
        > ⚠️ 이슈 생성 전 하단의 **Assignee**, **Label**을 반드시 선택해주세요.
        > 🔗 이슈 생성 후 **마일스톤 연결**을 잊지 마세요!

  - type: markdown
    attributes:
      value: "## ✏️ 전날 작성"

  - type: textarea
    id: done-tasks
    attributes:
      label: 오늘까지 진행한 작업
      value: |
        -
        -
    validations:
      required: true

  - type: textarea
    id: goals
    attributes:
      label: 재택 작업 목표
      value: |
        -
        -
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## ✅ 재택 당일"

  - type: input
    id: work-hours
    attributes:
      label: 근무 시간
      placeholder: "HH:MM ~ HH:MM"
    validations:
      required: true

  - type: input
    id: contact
    attributes:
      label: 연락 가능
      placeholder: "슬랙 상시 / 기타:"

  - type: checkboxes
    id: daily-routine
    attributes:
      label: 데일리 루틴
      options:
        - label: 스탠드업 참여
        - label: 작업 브랜치 확인 / 생성
        - label: 작업 단위별 커밋
        - label: 중간 진행 상황 슬랙 공유

  - type: checkboxes
    id: end-of-day
    attributes:
      label: 퇴근 전 마무리
      options:
        - label: 작업 브랜치 push
        - label: PR 생성 또는 WIP PR 업데이트
        - label: 코드 리뷰 요청
        - label: 오늘 한 일 간단 정리

  - type: textarea
    id: today-done
    attributes:
      label: 오늘 한 일
      value: |
        -
        -
