name: 문서 수정
description: 문서 추가, 수정, 삭제 등 문서 관련 작업에 사용해주세요
title: "[docs] "
type: "docs"
projects: ["zambaguni/2"]
body:
  - type: markdown
    attributes:
      value: |
        > ⚠️ 이슈 생성 전 하단의 **Assignee**, **Label**을 반드시 선택해주세요.

  - type: textarea
    id: description
    attributes:
      label: "📝 작업 설명"
      description: 어떤 문서를 수정/추가해야 하는지 설명해주세요
    validations:
      required: true

  - type: dropdown
    id: doc-type
    attributes:
      label: 문서 유형
      options:
        - README
        - API 문서
        - 가이드 / 튜토리얼
        - 주석 / 코드 문서
        - 기타
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: 영향 범위
      description: 해당하는 항목을 선택해주세요
      multiple: true
      options:
        - backend
        - fe-user
        - fe-admin
        - fe-partner
        - app-user
        - app-partner
        - CI/CD
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 추가 정보
      description: 참고 자료, 관련 이슈 등
