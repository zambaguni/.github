name: 성능 개선
description: 성능 문제 또는 최적화가 필요한 경우 이 템플릿을 사용해주세요
title: "[perf] "
type: "perf"
projects: ["zambaguni/2"]
body:
  - type: markdown
    attributes:
      value: |
        > ⚠️ 이슈 생성 전 하단의 **Assignee**, **Label**을 반드시 선택해주세요.

  - type: textarea
    id: current-state
    attributes:
      label: "📌 현재 상태"
      description: 현재 성능 문제를 설명해주세요 (응답 시간, 렌더링 속도, 메모리 사용량 등)
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "🎯 개선 목표"
      description: 어느 정도까지 개선되어야 하는지 구체적으로 설명해주세요
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: 영향 범위
      description: 해당하는 항목을 선택해주세요
      multiple: true
      options:
        - backend
        - fe-user
        - fe-admin
        - fe-partner
        - app-user
        - app-partner
        - CI/CD
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "🛠️ 제안하는 해결 방법"
      description: 개선 방법에 대한 아이디어가 있다면 설명해주세요

  - type: textarea
    id: additional
    attributes:
      label: 추가 정보
      description: 벤치마크 결과, 프로파일링 데이터, 참고 자료 등
