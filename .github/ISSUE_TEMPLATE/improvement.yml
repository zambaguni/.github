name: 개선 사항
description: 기존 기능의 개선을 제안하는 경우 이 템플릿을 사용해주세요
title: "[refactor] "
type: "refactor"
projects: ["zambaguni/2"]
body:
  - type: textarea
    id: current-state
    attributes:
      label: "📌 현재 상태"
      description: 현재 동작이나 상태를 설명해주세요. 어떤 점이 불편하거나 부족한가요?
    validations:
      required: true

  - type: textarea
    id: improvement
    attributes:
      label: "✨ 개선 사항"
      description: 어떻게 개선되었으면 하는지 구체적으로 설명해주세요
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: 영향 범위
      description: 해당하는 항목을 선택해주세요
      multiple: true
      options:
        - backend
        - fe-user
        - fe-admin
        - fe-partner
        - app-user
        - app-partner
        - CI/CD
    validations:
      required: true

  - type: textarea
    id: expected-effect
    attributes:
      label: 기대 효과
      description: 이 개선으로 얻을 수 있는 효과를 설명해주세요 (성능, UX, 생산성 등)

  - type: textarea
    id: additional
    attributes:
      label: 추가 정보
      description: 참고 자료, 스크린샷, 관련 이슈 등
