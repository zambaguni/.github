name: 버그 리포트
description: 버그를 발견한 경우 이 템플릿을 사용해주세요
title: "[fix] "
type: "fix"
projects: ["zambaguni/2"]
body:
  - type: markdown
    attributes:
      value: |
        > ⚠️ 이슈 생성 전 하단의 **Assignee**, **Label**를 반드시 선택해주세요.

  - type: textarea
    id: description
    attributes:
      label: "🐛 버그 설명"
      description: 어떤 버그인지 간단하고 명확하게 설명해주세요
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "📋 재현 방법"
      description: 버그를 재현할 수 있는 단계를 작성해주세요
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 정상적으로 동작했어야 하는 결과를 설명해주세요
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
      description: 실제로 발생한 결과를 설명해주세요
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: 심각도
      options:
        - Critical (서비스 장애, 데이터 손실)
        - Major (주요 기능 사용 불가)
        - Minor (기능은 동작하나 불편함)
        - Low (사소한 UI/UX 이슈)
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: "🖥️ 플랫폼"
      description: 버그가 발생한 플랫폼을 선택해주세요
      multiple: true
      options:
        - backend
        - fe-user
        - fe-admin
        - fe-partner
        - app-user
        - app-partner
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g., macOS 14, Windows 11, iOS 17, Android 14"

  - type: input
    id: browser
    attributes:
      label: 브라우저
      placeholder: "e.g., Chrome 120, Safari 17 (해당 시)"

  - type: input
    id: app-version
    attributes:
      label: 앱 버전
      placeholder: "e.g., v1.2.3 (해당 시)"

  - type: textarea
    id: screenshots
    attributes:
      label: 스크린샷 / 로그
      description: 스크린샷, 에러 로그, 콘솔 출력 등을 첨부해주세요

  - type: textarea
    id: additional
    attributes:
      label: 추가 정보
      description: 관련 이슈, 참고 링크 등
