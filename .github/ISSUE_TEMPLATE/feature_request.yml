name: 기능 요청
description: 새로운 기능을 제안하는 경우 이 템플릿을 사용해주세요
title: "[Feature] "
labels: ["feat"]
projects: ["zambaguni/2"]
body:
  - type: textarea
    id: description
    attributes:
      label: "💡 기능 설명"
      description: 제안하는 기능을 간단하고 명확하게 설명해주세요
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 배경 / 동기
      description: 이 기능이 필요한 이유를 설명해주세요. 어떤 문제를 해결하나요?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "🛠️ 제안하는 해결 방법"
      description: 구현 방법에 대한 아이디어가 있다면 설명해주세요

  - type: textarea
    id: alternatives
    attributes:
      label: 대안
      description: 고려한 다른 방법이 있다면 설명해주세요

  - type: dropdown
    id: platform
    attributes:
      label: 영향 범위
      description: 해당하는 항목을 선택해주세요
      multiple: true
      options:
        - backend
        - fe-user
        - fe-admin
        - fe-partner
        - app-user
        - app-partner
        - CI/CD
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 추가 정보
      description: 참고 자료, 스크린샷, 관련 이슈 등
